<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archiva Project Sizing — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f6f8;--surface:#fff;--border:#e2e5ea;--accent:#1d6ef5;--text:#1a1d23;--muted:#6b7280;--danger:#dc2626;--success:#16a34a;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px 28px;}
.admin-wrap{max-width:960px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.header h1 span{color:var(--accent);}
.header-right{display:flex;gap:10px;}
.back-btn,.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:.15s;}
.back-btn:hover{border-color:#93c5fd;color:var(--accent);}
.logout-btn:hover{border-color:#fca5a5;color:var(--danger);}
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.add-btn{background:var(--accent);border:none;border-radius:8px;padding:7px 16px;color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;}
.add-btn:hover{background:#1558d4;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid var(--border);font-weight:600;}
td{padding:11px 10px;border-bottom:1px solid #f3f4f6;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge.admin{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
.badge.user{background:#f9fafb;color:var(--muted);border:1px solid var(--border);}
.action-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 7px;border-radius:5px;transition:.15s;}
.action-btn.edit:hover{background:#eff6ff;}
.action-btn.del:hover{background:#fff1f2;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.12);}
.modal h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.field input,.field select{width:100%;background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,110,245,.1);background:#fff;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-row{display:flex;gap:10px;margin-top:6px;}
.modal-btn{flex:1;padding:11px;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.modal-btn.cancel{background:#f9fafb;color:var(--muted);border:1px solid var(--border);}
.modal-btn.cancel:hover{background:#f3f4f6;}
.modal-btn.save{background:var(--accent);color:#fff;font-weight:700;}
.modal-btn.save:hover{background:#1558d4;}
.modal-err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--danger);margin-bottom:12px;display:none;}
.modal-err.show{display:block;}
/* PWD */
.pwd-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;}
.pwd-btn{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 16px;color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;}
.pwd-btn:hover{background:#dbeafe;}
.hint{font-size:11px;color:var(--muted);margin-top:5px;}
</style>
</head>
<body>
<div class="admin-wrap">
<div class="header">
  <h1>archiva<span>.</span>sizing <span style="font-size:13px;color:var(--muted);font-weight:400">/ Admin</span></h1>
  <div class="header-right">
    <button class="back-btn" onclick="window.location.href='/'">← Torna all'app</button>
    <button class="logout-btn" id="logoutBtn">Esci</button>
  </div>
</div>

<div class="section">
  <div class="section-title">
    Gestione Utenti
    <button class="add-btn" onclick="openModal()">+ Nuovo utente</button>
  </div>
  <table>
    <thead><tr><th>Nome</th><th>Username</th><th>Ruolo</th><th>Posizione</th><th></th></tr></thead>
    <tbody id="usersTbody"><tr><td colspan="5" style="text-align:center;color:var(--muted);padding:28px">Caricamento…</td></tr></tbody>
  </table>
</div>

<div class="section">
  <div class="section-title">La mia password</div>
  <div class="pwd-grid">
    <div class="field" style="margin:0"><label>Password attuale</label><input type="password" id="curPwd" placeholder="••••••"></div>
    <div class="field" style="margin:0"><label>Nuova password</label><input type="password" id="newPwd" placeholder="••••••"></div>
    <button class="pwd-btn" onclick="changeMyPwd()">Aggiorna</button>
  </div>
  <div id="pwdMsg" style="margin-top:10px;font-size:12px;display:none;"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Nuovo utente</h3>
    <div class="modal-err" id="modalErr"></div>
    <div class="field"><label>Nome completo *</label><input type="text" id="fNome" placeholder="Mario Rossi"></div>
    <div class="field"><label>Username *</label><input type="text" id="fUsername" placeholder="mario.rossi"></div>
    <div class="field">
      <label>Password *</label>
      <input type="password" id="fPassword" placeholder="min. 6 caratteri">
      <div class="hint">Lascia vuoto per non cambiare (solo in modifica)</div>
    </div>
    <div class="grid2">
      <div class="field"><label>Ruolo</label>
        <select id="fRuolo"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
      <div class="field"><label>Posizione</label>
        <select id="fRole">
          <option value="Head of Project Delivery">Head of Project Delivery</option>
          <option value="Service Delivery Manager">Service Delivery Manager</option>
          <option value="Delivery & Customer Service Director">D&CS Director</option>
          <option value="Senior Project Manager">Senior Project Manager</option>
          <option value="Project Manager">Project Manager</option>
          <option value="Associate Project Manager">Associate Project Manager</option>
          <option value="Team Leader Service Delivery">Team Leader Service Delivery</option>
          <option value="Application Consultant">Application Consultant</option>
          <option value="Operation Delivery Specialist">Operation Delivery Specialist</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeModal()">Annulla</button>
      <button class="modal-btn save" onclick="saveUser()">Salva</button>
    </div>
  </div>
</div>
</div>

<script>
const TOKEN_KEY="sizing_token";
const USER_KEY="sizing_user";
function getToken(){return sessionStorage.getItem(TOKEN_KEY);}
function authH(){return{"Content-Type":"application/json","Authorization":"Bearer "+(getToken()||"")};}
let editingUsername=null;

(async()=>{
  const token=getToken();
  if(!token){window.location.href="/login";return;}
  const r=await fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+token}});
  if(!r.ok){sessionStorage.clear();window.location.href="/login";return;}
  const {user}=await r.json();
  if(user.ruolo!=="admin"){window.location.href="/";return;}
  loadUsers();
})();

document.getElementById("logoutBtn").addEventListener("click",async()=>{
  await fetch("/api/auth/logout",{method:"POST",headers:authH()});
  sessionStorage.clear();window.location.href="/login";
});

async function loadUsers(){
  const r=await fetch("/api/admin/users",{headers:authH()});
  if(!r.ok)return;
  const {data}=await r.json();
  const tbody=document.getElementById("usersTbody");
  if(!data.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:28px">Nessun utente</td></tr>';return;}
  tbody.innerHTML=data.map(u=>`
    <tr>
      <td style="font-weight:600">${u.nome}</td>
      <td style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace">${u.username}</td>
      <td><span class="badge ${u.ruolo}">${u.ruolo}</span></td>
      <td style="color:var(--muted);font-size:12px">${u.role||"—"}</td>
      <td style="text-align:right">
        <button class="action-btn edit" onclick="openModal('${u.username}','${u.nome}','${u.ruolo}','${u.role||''}')">✏️</button>
        <button class="action-btn del" onclick="deleteUser('${u.username}','${u.nome}')">🗑</button>
      </td>
    </tr>`).join("");
}

function openModal(username,nome,ruolo,role){
  editingUsername=username||null;
  document.getElementById("modalTitle").textContent=username?"Modifica utente":"Nuovo utente";
  document.getElementById("fNome").value=nome||"";
  document.getElementById("fUsername").value=username||"";
  document.getElementById("fUsername").disabled=!!username;
  document.getElementById("fPassword").value="";
  document.getElementById("fRuolo").value=ruolo||"user";
  document.getElementById("fRole").value=role||"Project Manager";
  document.getElementById("modalErr").classList.remove("show");
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}
function closeModalOutside(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}

async function saveUser(){
  const err=document.getElementById("modalErr");
  err.classList.remove("show");
  const nome=document.getElementById("fNome").value.trim();
  const username=document.getElementById("fUsername").value.trim().toLowerCase();
  const password=document.getElementById("fPassword").value;
  const ruolo=document.getElementById("fRuolo").value;
  const role=document.getElementById("fRole").value;
  if(!nome){err.textContent="Il nome è obbligatorio";err.classList.add("show");return;}
  if(!editingUsername&&!username){err.textContent="Lo username è obbligatorio";err.classList.add("show");return;}
  if(!editingUsername&&!password){err.textContent="La password è obbligatoria per i nuovi utenti";err.classList.add("show");return;}
  const body={nome,ruolo,role};
  if(password)body.password=password;
  if(!editingUsername)body.username=username;
  const url=editingUsername?`/api/admin/users/${editingUsername}`:"/api/admin/users";
  const method=editingUsername?"PUT":"POST";
  const r=await fetch(url,{method,headers:authH(),body:JSON.stringify(body)});
  const data=await r.json();
  if(!r.ok){err.textContent=data.detail||"Errore";err.classList.add("show");return;}
  closeModal();loadUsers();
}

async function deleteUser(username,nome){
  if(!confirm(`Eliminare l'utente ${nome}?`))return;
  const r=await fetch(`/api/admin/users/${username}`,{method:"DELETE",headers:authH()});
  if(r.ok)loadUsers();
  else{const d=await r.json();alert(d.detail||"Errore");}
}

async function changeMyPwd(){
  const msg=document.getElementById("pwdMsg");
  const cur=document.getElementById("curPwd").value;
  const nw=document.getElementById("newPwd").value;
  if(!cur||!nw){msg.style.color="var(--danger)";msg.textContent="Compila entrambi i campi";msg.style.display="block";return;}
  const r=await fetch("/api/auth/change-password",{method:"POST",headers:authH(),body:JSON.stringify({currentPassword:cur,newPassword:nw})});
  const d=await r.json();
  if(r.ok){msg.style.color="var(--success)";msg.textContent="Password aggiornata ✓";}
  else{msg.style.color="var(--danger)";msg.textContent=d.detail||"Errore";}
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",3000);
}
</script>
</body>
</html>
